version: "2"
linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
linters-settings:
  goimports:
    local-prefixes: github.com/dhiazfathra/golang-clean-architecture
  revive:
    rules:
      - name: exported
        severity: warning
issues:
  exclude-rules:
    - path: "_test.go"
      linters: [errcheck]
